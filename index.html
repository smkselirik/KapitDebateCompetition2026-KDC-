<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Debate Results Dashboard</title>
    <style>
        /* CSS Styling */
        body, html {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #333;
            height: 100%;
        }

        /* Background Image set to 30% opacity and auto-adjusted */
        .bg-image {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-image: url('https://i.ibb.co/5xf5S4F1/Gemini-Generated-Image-lunqwclunqwclunq.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            opacity: 0.3; /* 30% transparent */
            z-index: -1;
        }

        /* Dashboard Container */
        .container {
            position: relative;
            max-width: 1100px;
            margin: 40px auto;
            padding: 20px 40px;
            background: rgba(255, 255, 255, 0.9); /* slight white overlay for readability */
            border-radius: 12px;
            box-shadow: 0 8px 16px rgba(0, 0, 0, 0.2);
            z-index: 1;
        }

        h1 {
            text-align: center;
            color: #2c3e50;
            margin-bottom: 30px;
            font-size: 2.5em;
        }

        /* Tab Navigation */
        .tabs {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 20px;
        }

        .tab-btn {
            background-color: #34495e;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
            transition: background 0.3s;
        }

        .tab-btn.active, .tab-btn:hover {
            background-color: #3498db;
        }

        /* Tab Content area */
        .tab-content {
            display: none;
            animation: fadeIn 0.5s;
        }

        .tab-content.active {
            display: block;
        }

        /* Table Styling */
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
            background: white;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        th, td {
            padding: 12px 15px;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }

        th {
            background-color: #2c3e50;
            color: white;
            text-transform: uppercase;
            font-size: 14px;
        }

        tr:hover { background-color: #f5f5f5; }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .loading {
            text-align: center;
            font-style: italic;
            color: #7f8c8d;
        }
    </style>
</head>
<body>

    <div class="bg-image"></div>

    <div class="container">
        <h1>Debate Results Dashboard</h1>

        <div class="tabs">
            <button class="tab-btn active" onclick="openTab(event, 'prelim')">Prelim Results</button>
            <button class="tab-btn" onclick="openTab(event, 'overall')">Overall Results</button>
            <button class="tab-btn" onclick="openTab(event, 'teams')">Team Members</button>
        </div>

        <div id="prelim" class="tab-content active">
            <div id="prelim-table" class="loading">Loading Prelim Results...</div>
        </div>

        <div id="overall" class="tab-content">
            <div id="overall-table" class="loading">Loading Overall Results...</div>
        </div>

        <div id="teams" class="tab-content">
            <div id="teams-table" class="loading">Loading Team Members...</div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <script>
        // --- URLs for the CSV Data ---
        // The one you provided (assuming this is Prelim Results based on context)
        const prelimCSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSUY7U6_iO_42hj60Uxln6O-YjwkQEs_m17oN00xKi8Dgn6okSGrM6oU_jBw88qjtsiuI5RJfoYvyzI/pub?gid=490653394&single=true&output=csv";
        
        // ** IMPORTANT: Replace these two links with the specific output=csv links for your other tabs **
        const overallCSV_URL = "YOUR_OVERALL_RESULTS_CSV_LINK_HERE"; 
        const masterCSV_URL = "YOUR_MASTER_2_CSV_LINK_HERE"; 

        // Function to switch between tabs
        function openTab(evt, tabName) {
            let tabContents = document.getElementsByClassName("tab-content");
            for (let i = 0; i < tabContents.length; i++) {
                tabContents[i].classList.remove("active");
            }
            let tabBtns = document.getElementsByClassName("tab-btn");
            for (let i = 0; i < tabBtns.length; i++) {
                tabBtns[i].classList.remove("active");
            }
            document.getElementById(tabName).classList.add("active");
            evt.currentTarget.classList.add("active");
        }

        // Function to fetch and render standard CSVs (Prelim and Overall)
        function loadStandardTable(url, containerId) {
            if(url.includes("YOUR_")) {
                document.getElementById(containerId).innerHTML = "<p style='color:red;'>Please add the correct Google Sheet CSV publish link to the code to view this data.</p>";
                return;
            }

            Papa.parse(url, {
                download: true,
                header: true,
                skipEmptyLines: true,
                complete: function(results) {
                    let data = results.data;
                    let headers = results.meta.fields;

                    let tableHTML = "<table><thead><tr>";
                    // Build Headers
                    headers.forEach(header => {
                        tableHTML += `<th>${header}</th>`;
                    });
                    tableHTML += "</tr></thead><tbody>";

                    // Build Rows
                    data.forEach(row => {
                        tableHTML += "<tr>";
                        headers.forEach(header => {
                            tableHTML += `<td>${row[header] || ""}</td>`;
                        });
                        tableHTML += "</tr>";
                    });

                    tableHTML += "</tbody></table>";
                    document.getElementById(containerId).innerHTML = tableHTML;
                }
            });
        }

        // Function to fetch and specifically format the 'MASTER 2' Tab
        function loadMasterTable(url, containerId) {
            if(url.includes("YOUR_")) {
                document.getElementById(containerId).innerHTML = "<p style='color:red;'>Please add the correct Google Sheet CSV publish link for 'MASTER 2' to the code to view this data.</p>";
                return;
            }

            Papa.parse(url, {
                download: true,
                header: false, // We use false because we want specific column indexes
                skipEmptyLines: true,
                complete: function(results) {
                    let data = results.data;
                    
                    // Column Index Mapping (0-indexed array)
                    // Col B = Index 1 (Name)
                    // Col D = Index 3 (Form)
                    // Col E = Index 4 (School Name)
                    // Col F = Index 5 (Team)

                    let tableHTML = `
                        <table>
                            <thead>
                                <tr>
                                    <th>Name</th>
                                    <th>Form</th>
                                    <th>School Name</th>
                                    <th>Team</th>
                                </tr>
                            </thead>
                            <tbody>
                    `;

                    // Start from index 1 to skip header row of the sheet (assuming row 1 is headers)
                    for (let i = 1; i < data.length; i++) {
                        let row = data[i];
                        // ensure row has enough columns
                        if(row.length >= 6) {
                            tableHTML += `
                                <tr>
                                    <td>${row[1] || "-"}</td>
                                    <td>${row[3] || "-"}</td>
                                    <td>${row[4] || "-"}</td>
                                    <td>${row[5] || "-"}</td>
                                </tr>
                            `;
                        }
                    }

                    tableHTML += "</tbody></table>";
                    document.getElementById(containerId).innerHTML = tableHTML;
                }
            });
        }

        // Initialize fetching on page load
        window.onload = function() {
            loadStandardTable(prelimCSV_URL, 'prelim-table');
            loadStandardTable(overallCSV_URL, 'overall-table');
            loadMasterTable(masterCSV_URL, 'teams-table');
        };
    </script>

</body>
</html>
