<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Debate Results Dashboard</title>
    <style>
        /* Base styling */
        body, html {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: #333;
            height: 100%;
        }

        /* Background setup: 30% transparent and auto-adjusting */
        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-image: url('https://i.ibb.co/5xf5S4F1/Gemini-Generated-Image-lunqwclunqwclunq.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            opacity: 0.3;
            z-index: -1;
        }

        /* Main Dashboard Container */
        .container {
            max-width: 1100px;
            margin: 40px auto;
            padding: 30px;
            background: rgba(255, 255, 255, 0.9); /* Opaque white overlay for text readability */
            border-radius: 12px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.15);
        }

        h1 {
            text-align: center;
            color: #2c3e50;
            margin-bottom: 25px;
            font-size: 2.2em;
        }

        /* Tab Navigation */
        .tabs {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 25px;
        }

        .tab-btn {
            background-color: #34495e;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            transition: background 0.3s;
        }

        .tab-btn.active, .tab-btn:hover {
            background-color: #3498db;
        }

        /* Tab Content */
        .tab-content {
            display: none;
            animation: fadeIn 0.4s ease-in-out;
        }

        .tab-content.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Table Styling */
        .table-responsive {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }

        th, td {
            padding: 14px;
            text-align: left;
            border-bottom: 1px solid #e0e0e0;
        }

        th {
            background-color: #2c3e50;
            color: white;
            font-weight: 600;
            white-space: nowrap;
        }

        tr:nth-child(even) {
            background-color: #f9f9f9;
        }

        tr:hover {
            background-color: #f1f2f6;
        }
        
        .loading {
            text-align: center;
            font-style: italic;
            color: #7f8c8d;
            padding: 40px 20px;
            font-size: 1.1em;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Debate Results Dashboard</h1>

        <div class="tabs">
            <button class="tab-btn active" onclick="openTab(event, 'prelim')">Prelim Results</button>
            <button class="tab-btn" onclick="openTab(event, 'overall')">Overall Results</button>
            <button class="tab-btn" onclick="openTab(event, 'teams')">Team Members</button>
        </div>

        <div id="prelim" class="tab-content active">
            <div class="table-responsive">
                <div id="prelim-table" class="loading">Fetching Prelim Results...</div>
            </div>
        </div>

        <div id="overall" class="tab-content">
            <div class="table-responsive">
                <div id="overall-table" class="loading">Fetching Overall Results...</div>
            </div>
        </div>

        <div id="teams" class="tab-content">
            <div class="table-responsive">
                <div id="teams-table" class="loading">Fetching Team Members...</div>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <script>
        // Data Sources
        const PRELIM_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSUY7U6_iO_42hj60Uxln6O-YjwkQEs_m17oN00xKi8Dgn6okSGrM6oU_jBw88qjtsiuI5RJfoYvyzI/pub?gid=490653394&single=true&output=csv";
        const OVERALL_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSUY7U6_iO_42hj60Uxln6O-YjwkQEs_m17oN00xKi8Dgn6okSGrM6oU_jBw88qjtsiuI5RJfoYvyzI/pub?gid=1922779286&single=true&output=csv";
        const MASTER_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSUY7U6_iO_42hj60Uxln6O-YjwkQEs_m17oN00xKi8Dgn6okSGrM6oU_jBw88qjtsiuI5RJfoYvyzI/pub?gid=543182448&single=true&output=csv";

        // Tab Switching Logic
        function openTab(evt, tabName) {
            let tabContents = document.getElementsByClassName("tab-content");
            for (let i = 0; i < tabContents.length; i++) {
                tabContents[i].classList.remove("active");
            }
            let tabBtns = document.getElementsByClassName("tab-btn");
            for (let i = 0; i < tabBtns.length; i++) {
                tabBtns[i].classList.remove("active");
            }
            document.getElementById(tabName).classList.add("active");
            evt.currentTarget.classList.add("active");
        }

        // Standard Table Loader (For Prelim & Overall Tabs)
        function loadStandardTable(url, containerId) {
            Papa.parse(url, {
                download: true,
                header: true,
                skipEmptyLines: true,
                complete: function(results) {
                    let data = results.data;
                    let headers = results.meta.fields;
                    
                    let tableHTML = "<table><thead><tr>";
                    headers.forEach(header => tableHTML += `<th>${header}</th>`);
                    tableHTML += "</tr></thead><tbody>";

                    data.forEach(row => {
                        tableHTML += "<tr>";
                        headers.forEach(header => tableHTML += `<td>${row[header] || ""}</td>`);
                        tableHTML += "</tr>";
                    });

                    tableHTML += "</tbody></table>";
                    document.getElementById(containerId).innerHTML = tableHTML;
                },
                error: function() {
                    document.getElementById(containerId).innerHTML = "Error loading data. Please check the sheet link.";
                }
            });
        }

        // Specific Table Loader for MASTER 2 (Filters specific columns)
        function loadMasterTable(url, containerId) {
            Papa.parse(url, {
                download: true,
                header: false, // Treat as raw arrays to target specific column indexes
                skipEmptyLines: true,
                complete: function(results) {
                    let data = results.data;
                    
                    // Array Index Mapping (Google Sheets Columns)
                    // Col B (Name) = Index 1
                    // Col D (Form) = Index 3
                    // Col E (School) = Index 4
                    // Col F (Team) = Index 5

                    let tableHTML = `
                        <table>
                            <thead>
                                <tr>
                                    <th>School Name</th>
                                    <th>Team</th>
                                    <th>Name</th>
                                    <th>Form</th>
                                </tr>
                            </thead>
                            <tbody>
                    `;

                    // Start loop at index 1 to skip the master sheet's header row
                    for (let i = 1; i < data.length; i++) {
                        let row = data[i];
                        // Ensure the row has enough columns populated to avoid undefined errors
                        if (row.length >= 6) { 
                            tableHTML += `
                                <tr>
                                    <td>${row[4] || "-"}</td>
                                    <td>${row[5] || "-"}</td>
                                    <td>${row[1] || "-"}</td>
                                    <td>${row[3] || "-"}</td>
                                </tr>
                            `;
                        }
                    }
                    tableHTML += "</tbody></table>";
                    document.getElementById(containerId).innerHTML = tableHTML;
                },
                error: function() {
                    document.getElementById(containerId).innerHTML = "Error loading data. Please check the sheet link.";
                }
            });
        }

        // Initialize Data Fetching on Window Load
        window.onload = function() {
            loadStandardTable(PRELIM_URL, 'prelim-table');
            loadStandardTable(OVERALL_URL, 'overall-table');
            loadMasterTable(MASTER_URL, 'teams-table');
        };
    </script>
</body>
</html>
